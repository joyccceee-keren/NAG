<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Package background -->
  <rect width="200" height="240" fill="#DC143C"/>
  
  <!-- Kurkure branding -->
  <text x="100" y="50" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">KURKURE</text>
  <text x="100" y="85" font-size="14" fill="#FFD700" text-anchor="middle" font-family="Arial">Spicy Twist</text>
  
  <!-- Twist snack illustration -->
  <path d="M 80 110 Q 100 130 120 110" stroke="#FF6347" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 75 125 Q 100 145 125 125" stroke="#FF7F50" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Spice dots -->
  <circle cx="90" cy="115" r="1.5" fill="#FFD700"/>
  <circle cx="110" cy="120" r="1.5" fill="#FFD700"/>
  <circle cx="85" cy="130" r="1" fill="#FFD700"/>
  <circle cx="115" cy="135" r="1" fill="#FFD700"/>
  
  <!-- Bottom banner -->
  <rect y="200" width="200" height="40" fill="#8B0000"/>
  <text x="100" y="225" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Spicy Crunch</text>
</svg>