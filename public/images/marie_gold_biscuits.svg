<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Package Shadow -->
  <ellipse cx="150" cy="250" rx="75" ry="12" fill="#e0e0e0" opacity="0.6" filter="blur(6px)"/>
  <!-- Package (cylinder shape) -->
  <rect x="75" y="110" width="150" height="110" rx="15" fill="url(#marieOrange)" stroke="#e65100" stroke-width="1.5"/>
  <!-- Gold Ends -->
  <path d="M75,110 C80,110 85,120 85,165 C85,210 80,220 75,220 Z" fill="#FFD54F"/>
  <path d="M225,110 C220,110 215,120 215,165 C215,210 220,220 225,220 Z" fill="#FFD54F"/>
  <!-- Text Label -->
  <text x="150" y="152" font-family="Arial Black, Impact, sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">MARIE GOLD</text>
  <!-- Biscuit illustration -->
  <circle cx="150" cy="190" r="22" fill="#FFE082" stroke="#FFA000" stroke-width="1.5"/>
  <circle cx="150" cy="190" r="16" fill="none" stroke="#FFB300" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="150" y="193" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#B26A00" text-anchor="middle">MARIE</text>
  <!-- Teacup small icon -->
  <path d="M100,185 H112 V193 C112,198 108,198 106,198 H100 Z" fill="#FFF"/>
  <path d="M112,188 A3,3 0 0,1 115,191 A3,3 0 0,1 112,194" stroke="#FFF" stroke-width="1.5" fill="none"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="marieOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="50%" stop-color="#FB8C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
</svg>
