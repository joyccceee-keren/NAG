  <text x="100" y="55" font-size="24" font-weight="bold" fill="#228B22" text-anchor="middle" font-family="Arial">BALAJI</text>
  
  <text x="100" y="95" font-size="13" fill="white" text-anchor="middle" font-family="Arial">RUMBLES</text>
