<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#greenGrad)" stroke="#1F6B1F" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="60" fill="#DC143C" rx="3"/>
  <text x="100" y="60" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">LAY'S</text>
  
  <text x="100" y="100" font-size="14" fill="#228B22" text-anchor="middle" font-family="Arial">CREAM & ONION</text>
  
  <!-- Chips with cream coloring -->
  <ellipse cx="70" cy="140" rx="18" ry="28" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
  <ellipse cx="100" cy="145" rx="20" ry="32" fill="#DEB887" stroke="#CD853F" stroke-width="1.5"/>
  <ellipse cx="130" cy="140" rx="18" ry="28" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
  
  <!-- Onion bits detail -->
  <circle cx="75" cy="130" r="2" fill="#A0522D" opacity="0.7"/>
  <circle cx="100" cy="135" r="2" fill="#A0522D" opacity="0.7"/>
  <circle cx="125" cy="130" r="2" fill="#A0522D" opacity="0.7"/>
  
  <text x="100" y="195" font-size="12" fill="#333" text-anchor="middle" font-family="Arial">26g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#1F6B1F" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Creamy Onion Flavor</text>
</svg>