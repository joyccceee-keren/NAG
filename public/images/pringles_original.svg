<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Can Shadow -->
  <ellipse cx="150" cy="265" rx="40" ry="8" fill="#e0e0e0" opacity="0.6" filter="blur(6px)"/>
  <!-- Can Body -->
  <rect x="115" y="50" width="70" height="210" rx="6" fill="url(#pringlesRed)" stroke="#b71c1c" stroke-width="1.5"/>
  <!-- Lid -->
  <ellipse cx="150" cy="50" rx="36" ry="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <ellipse cx="150" cy="48" rx="36" ry="6" fill="#e0e0e0" opacity="0.5"/>
  <!-- Pringles Mustache Man Logo -->
  <circle cx="150" cy="95" r="22" fill="#ffffff" stroke="#212121" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="142" cy="90" r="3" fill="#212121"/>
  <circle cx="158" cy="90" r="3" fill="#212121"/>
  <!-- Mustache -->
  <path d="M125,100 Q150,112 175,100 Q185,115 150,115 Q115,115 125,100 Z" fill="#212121"/>
  <!-- Red Bowtie -->
  <path d="M140,118 L160,118 L165,124 L135,124 Z" fill="#D32F2F"/>
  <!-- Text Label -->
  <text x="150" y="150" font-family="Impact, Arial Black, sans-serif" font-size="14" fill="#FFEB3B" stroke="#b71c1c" stroke-width="0.5" text-anchor="middle">PRINGLES</text>
  <text x="150" y="168" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">ORIGINAL</text>
  <!-- Chip illustration -->
  <path d="M130,225 Q150,205 170,225 Q150,235 130,225 Z" fill="#FFE082" stroke="#FFB300" stroke-width="1"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="pringlesRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#8E0000"/>
    </linearGradient>
  </defs>
</svg>
