<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Shadows -->
  <ellipse cx="125" cy="255" rx="60" ry="10" fill="#e0e0e0" opacity="0.6" filter="blur(6px)"/>
  <ellipse cx="215" cy="255" rx="30" ry="6" fill="#e0e0e0" opacity="0.6" filter="blur(4px)"/>
  <!-- Nacho Bag -->
  <path d="M75,70 L175,70 Q185,70 180,100 L165,235 Q160,250 125,250 Q90,250 85,235 L70,100 Q65,70 75,70 Z" fill="url(#nachoBlack)" stroke="#212121" stroke-width="1.5"/>
  <path d="M70,70 L180,70" stroke="#212121" stroke-width="3" stroke-dasharray="2,2"/>
  <!-- Bag Label -->
  <polygon points="90,140 160,140 150,195 100,195" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="125" y="162" font-family="Impact, Arial Black, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">NACHOS</text>
  <text x="125" y="180" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="bold" fill="#212121" text-anchor="middle">MEXICAN STYLE</text>
  <!-- Salsa Bowl -->
  <circle cx="215" cy="235" r="28" fill="#EEEEEE" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Salsa Red Dip -->
  <circle cx="215" cy="235" r="22" fill="#D84315"/>
  <circle cx="210" cy="230" r="4" fill="#BF360C"/>
  <circle cx="222" cy="238" r="3" fill="#880E4F"/>
  <path d="M205,220 Q215,225 220,222" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Tortilla Chip standing -->
  <polygon points="195,225 210,195 220,220" fill="#FFCA28" stroke="#FFB300" stroke-width="1"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="nachoBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="50%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
  </defs>
</svg>
