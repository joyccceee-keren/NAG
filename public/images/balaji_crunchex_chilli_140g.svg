  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#orangeGrad)" stroke="#DC143C" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="white" rx="3"/>
  <text x="100" y="55" font-size="24" font-weight="bold" fill="#FF6347" text-anchor="middle" font-family="Arial">BALAJI</text>
  
  <text x="100" y="95" font-size="13" fill="white" text-anchor="middle" font-family="Arial">CRUNCHEX</text>
