<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Bag Shadow -->
  <ellipse cx="150" cy="260" rx="70" ry="12" fill="#e0e0e0" opacity="0.6" filter="blur(8px)"/>
  <!-- Bag Body -->
  <path d="M90,60 L210,60 Q225,60 220,95 L200,230 Q195,250 150,250 Q105,250 100,230 L80,95 Q75,60 90,60 Z" fill="url(#greenGrad)" stroke="#1b5e20" stroke-width="1.5"/>
  <!-- Top/Bottom crimps -->
  <path d="M85,60 L215,60" stroke="#1b5e20" stroke-width="4" stroke-dasharray="2,2"/>
  <path d="M96,248 L204,248" stroke="#1b5e20" stroke-width="4" stroke-dasharray="2,2"/>
  <!-- Lays Sun Logo -->
  <circle cx="150" cy="125" r="32" fill="url(#yellowSun)"/>
  <path d="M110,132 Q150,115 190,132 Q185,148 150,148 Q115,148 110,132 Z" fill="#D32F2F"/>
  <text x="150" y="141" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="13" fill="#ffffff" text-anchor="middle">Lay's</text>
  <!-- Flavor Label -->
  <rect x="105" y="175" width="90" height="24" rx="12" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="150" y="187" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Cream &amp; Onion</text>
  <!-- Onions illustration -->
  <circle cx="135" cy="220" r="12" fill="#E0F2F1" stroke="#00796B" stroke-width="1"/>
  <path d="M135,208 L135,232" stroke="#00796B" stroke-width="1"/>
  <circle cx="165" cy="222" r="10" fill="#FFF" stroke="#FFB300" stroke-dasharray="2,2"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="yellowSun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
</svg>
