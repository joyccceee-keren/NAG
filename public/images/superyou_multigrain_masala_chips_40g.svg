<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#earthGrad)" stroke="#3E2723" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="#FFD700" rx="3"/>
  <text x="100" y="55" font-size="18" font-weight="bold" fill="#654321" text-anchor="middle" font-family="Arial">SUPERYOU</text>
  
  <text x="100" y="95" font-size="12" fill="white" text-anchor="middle" font-family="Arial">MULTIGRAIN</text>
  <text x="100" y="110" font-size="12" fill="#FFD700" text-anchor="middle" font-family="Arial">Masala Chips</text>
  
  <!-- Multi-grain representation -->
  <polygon points="65,130 75,165 55,155" fill="#8B6914" stroke="#654321" stroke-width="1.5"/>
  <polygon points="100,125 110,170 90,160" fill="#A0826D" stroke="#654321" stroke-width="1.5"/>
  <polygon points="135,130 145,165 125,155" fill="#8B6914" stroke="#654321" stroke-width="1.5"/>
  
  <!-- Masala spice -->
  <circle cx="68" cy="145" r="1.5" fill="#FF6347" opacity="0.6"/>
  <circle cx="103" cy="145" r="1.5" fill="#FF6347" opacity="0.6"/>
  <circle cx="138" cy="145" r="1.5" fill="#FF6347" opacity="0.6"/>
  
  <text x="100" y="190" font-size="12" fill="white" text-anchor="middle" font-family="Arial">40g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#3E2723" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Healthy Snack</text>
