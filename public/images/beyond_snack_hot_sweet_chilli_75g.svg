<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="redChilliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#redChilliGrad)" stroke="#8B0000" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="white" rx="3"/>
  <text x="100" y="55" font-size="22" font-weight="bold" fill="#FF4500" text-anchor="middle" font-family="Arial">BEYOND</text>
  
  <text x="100" y="95" font-size="13" fill="white" text-anchor="middle" font-family="Arial">HOT & SWEET</text>
  <text x="100" y="110" font-size="12" fill="#FFD700" text-anchor="middle" font-family="Arial">Chilli</text>
  
  <!-- Hot and sweet representation -->
  <circle cx="70" cy="145" r="14" fill="#FF6347" stroke="#8B0000" stroke-width="1.5"/>
  <circle cx="105" cy="140" r="15" fill="#FF4500" stroke="#8B0000" stroke-width="1.5"/>
  <circle cx="130" cy="148" r="13" fill="#FF6347" stroke="#8B0000" stroke-width="1.5"/>
  
  <!-- Sweet sparkles -->
  <circle cx="68" cy="140" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="105" cy="135" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="132" cy="143" r="2" fill="#FFD700" opacity="0.8"/>
  
  <text x="100" y="190" font-size="12" fill="white" text-anchor="middle" font-family="Arial">75g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#8B0000" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Bold Flavor</text>
</svg>