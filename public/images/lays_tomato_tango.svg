<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Bag Shadow -->
  <ellipse cx="150" cy="260" rx="70" ry="12" fill="#e0e0e0" opacity="0.6" filter="blur(8px)"/>
  <!-- Bag Body -->
  <path d="M90,60 L210,60 Q225,60 220,95 L200,230 Q195,250 150,250 Q105,250 100,230 L80,95 Q75,60 90,60 Z" fill="url(#redGrad)" stroke="#b71c1c" stroke-width="1.5"/>
  <!-- Top/Bottom crimps -->
  <path d="M85,60 L215,60" stroke="#b71c1c" stroke-width="4" stroke-dasharray="2,2"/>
  <path d="M96,248 L204,248" stroke="#b71c1c" stroke-width="4" stroke-dasharray="2,2"/>
  <!-- Lays Sun Logo -->
  <circle cx="150" cy="125" r="32" fill="url(#yellowSun)"/>
  <path d="M110,132 Q150,115 190,132 Q185,148 150,148 Q115,148 110,132 Z" fill="#D32F2F"/>
  <text x="150" y="141" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="13" fill="#ffffff" text-anchor="middle">Lay's</text>
  <!-- Flavor Label -->
  <rect x="105" y="175" width="90" height="24" rx="12" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="150" y="187" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Spanish Tomato</text>
  <!-- Tomato illustration -->
  <circle cx="150" cy="220" r="12" fill="#FF1744" stroke="#B71C1C" stroke-width="1"/>
  <circle cx="150" cy="220" r="8" fill="none" stroke="#FFF" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="150" cy="220" r="2" fill="#FFF"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="yellowSun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
  </defs>
</svg>
