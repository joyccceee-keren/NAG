<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Package background -->
  <rect width="200" height="240" fill="#FF6B35"/>
  
  <!-- Doritos branding -->
  <text x="100" y="50" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">DORITOS</text>
  <text x="100" y="85" font-size="14" fill="yellow" text-anchor="middle" font-family="Arial">Nacho Cheese</text>
  
  <!-- Chip illustration -->
  <polygon points="70,120 100,140 130,120 120,100 110,95 90,95 80,100" fill="#FFB81C" stroke="#FF8C00" stroke-width="2"/>
  <polygon points="75,125 105,145 125,125 115,105 105,98 95,98 85,105" fill="#FFC93D" stroke="#FF8C00" stroke-width="2"/>
  
  <!-- Cheese texture -->
  <circle cx="85" cy="110" r="2" fill="#FF8C00" opacity="0.6"/>
  <circle cx="110" cy="115" r="2" fill="#FF8C00" opacity="0.6"/>
  <circle cx="95" cy="130" r="1.5" fill="#FF8C00" opacity="0.6"/>
  
  <!-- Bottom banner -->
  <rect y="200" width="200" height="40" fill="#1F1F1F"/>
  <text x="100" y="225" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Tasty Snack</text>
</svg>