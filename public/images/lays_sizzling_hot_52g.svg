<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#redGrad)" stroke="#8B0000" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="60" fill="#FFD700" rx="3"/>
  <text x="100" y="60" font-size="32" font-weight="bold" fill="#DC143C" text-anchor="middle" font-family="Arial">LAY'S</text>
  
  <text x="100" y="100" font-size="14" fill="white" text-anchor="middle" font-family="Arial">SIZZLING HOT</text>
  
  <!-- Spicy red chips -->
  <ellipse cx="70" cy="140" rx="18" ry="28" fill="#FF7F50" stroke="#DC143C" stroke-width="1.5"/>
  <ellipse cx="100" cy="145" rx="20" ry="32" fill="#FF6347" stroke="#DC143C" stroke-width="1.5"/>
  <ellipse cx="130" cy="140" rx="18" ry="28" fill="#FF7F50" stroke="#DC143C" stroke-width="1.5"/>
  
  <!-- Spice sparkles -->
  <circle cx="75" cy="130" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="100" cy="135" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="125" cy="130" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="85" cy="150" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="115" cy="155" r="1.5" fill="#FFD700" opacity="0.7"/>
  
  <text x="100" y="195" font-size="12" fill="white" text-anchor="middle" font-family="Arial">52.9g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#8B0000" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Hot & Spicy</text>
</svg>