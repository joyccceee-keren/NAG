<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Package background -->
  <rect width="200" height="240" fill="#4169E1"/>
  
  <!-- Parle branding -->
  <text x="100" y="50" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">PARLE</text>
  <text x="100" y="85" font-size="14" fill="#FFD700" text-anchor="middle" font-family="Arial">Magic</text>
  
  <!-- Cookie illustration -->
  <circle cx="80" cy="125" r="20" fill="#DAA520" stroke="#8B7500" stroke-width="1"/>
  <circle cx="110" cy="130" r="18" fill="#F0E68C" stroke="#8B7500" stroke-width="1"/>
  
  <!-- Cookie texture -->
  <circle cx="75" cy="120" r="1.5" fill="#8B7500" opacity="0.6"/>
  <circle cx="85" cy="130" r="1.5" fill="#8B7500" opacity="0.6"/>
  <circle cx="115" cy="125" r="1.5" fill="#8B7500" opacity="0.6"/>
  <circle cx="105" cy="138" r="1.5" fill="#8B7500" opacity="0.6"/>
  
  <!-- Shine effect -->
  <ellipse cx="75" cy="115" rx="5" ry="3" fill="white" opacity="0.4"/>
  <ellipse cx="105" cy="120" rx="4" ry="2" fill="white" opacity="0.3"/>
  
  <!-- Bottom banner -->
  <rect y="200" width="200" height="40" fill="#1F1F1F"/>
  <text x="100" y="225" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Sweet Magic</text>
</svg>