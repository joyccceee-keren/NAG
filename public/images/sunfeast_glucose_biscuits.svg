<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Package background -->
  <rect width="200" height="240" fill="#D2B48C"/>
  
  <!-- Sunfeast branding -->
  <text x="100" y="50" font-size="24" font-weight="bold" fill="#8B4513" text-anchor="middle" font-family="Arial">SUNFEAST</text>
  <text x="100" y="85" font-size="14" fill="#654321" text-anchor="middle" font-family="Arial">Glucose</text>
  
  <!-- Biscuit illustration -->
  <rect x="70" y="110" width="30" height="30" fill="#CD853F" stroke="#8B4513" stroke-width="1" rx="2"/>
  <rect x="100" y="115" width="30" height="28" fill="#DEB887" stroke="#8B4513" stroke-width="1" rx="2"/>
  
  <!-- Biscuit texture dots -->
  <circle cx="78" cy="120" r="1.5" fill="#8B4513" opacity="0.5"/>
  <circle cx="88" cy="125" r="1.5" fill="#8B4513" opacity="0.5"/>
  <circle cx="82" cy="135" r="1.5" fill="#8B4513" opacity="0.5"/>
  <circle cx="108" cy="122" r="1.5" fill="#8B4513" opacity="0.5"/>
  <circle cx="118" cy="130" r="1.5" fill="#8B4513" opacity="0.5"/>
  
  <!-- Bottom banner -->
  <rect y="200" width="200" height="40" fill="#8B4513"/>
  <text x="100" y="225" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Crunchy Biscuits</text>
</svg>