<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="goldenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#goldenGrad)" stroke="#B8860B" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="#FF6347" rx="3"/>
  <text x="100" y="55" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">MOTA'S</text>
  
  <text x="100" y="95" font-size="13" fill="#8B4513" text-anchor="middle" font-family="Arial">PREMIUM</text>
  <text x="100" y="110" font-size="12" fill="#FF6347" text-anchor="middle" font-family="Arial">Salted Chips</text>
  
  <!-- Premium chips -->
  <ellipse cx="70" cy="145" rx="17" ry="27" fill="#FFB347" stroke="#FF8C00" stroke-width="1.5"/>
  <ellipse cx="100" cy="140" rx="19" ry="31" fill="#FFA500" stroke="#FF8C00" stroke-width="1.5"/>
  <ellipse cx="130" cy="148" rx="17" ry="27" fill="#FFB347" stroke="#FF8C00" stroke-width="1.5"/>
  
  <!-- Salt coating -->
  <circle cx="68" cy="135" r="2" fill="white" opacity="0.7"/>
  <circle cx="100" cy="130" r="2" fill="white" opacity="0.7"/>
  <circle cx="132" cy="140" r="2" fill="white" opacity="0.7"/>
  
  <text x="100" y="190" font-size="12" fill="#8B4513" text-anchor="middle" font-family="Arial">100g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#B8860B" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Premium Taste</text>
</svg>