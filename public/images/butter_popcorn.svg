<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Bucket Shadow -->
  <ellipse cx="150" cy="260" rx="55" ry="10" fill="#e0e0e0" opacity="0.6" filter="blur(6px)"/>
  <!-- Bucket Body -->
  <path d="M105,120 L195,120 L180,250 L120,250 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Stripes -->
  <path d="M115,120 L125,250 H135 L125,120 Z" fill="#D32F2F"/>
  <path d="M145,120 L145,250 H155 L155,120 Z" fill="#D32F2F"/>
  <path d="M175,120 L165,250 H175 L185,120 Z" fill="#D32F2F"/>
  <!-- Label -->
  <rect x="115" y="160" width="70" height="30" rx="4" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <text x="150" y="178" font-family="Impact, Arial Black, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle">POPCORN</text>
  <text x="150" y="187" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="6" fill="#ffffff" text-anchor="middle">BUTTER</text>
  <!-- Popcorn Overflowing -->
  <circle cx="120" cy="115" r="14" fill="#FFFDE7" stroke="#FFE082" stroke-width="1"/>
  <circle cx="138" cy="108" r="16" fill="#FFFDE7" stroke="#FFE082" stroke-width="1"/>
  <circle cx="155" cy="105" r="18" fill="#FFF9C4" stroke="#FFF59D" stroke-width="1"/>
  <circle cx="174" cy="112" r="15" fill="#FFFDE7" stroke="#FFE082" stroke-width="1"/>
  <circle cx="130" cy="95" r="12" fill="#FFF9C4" stroke="#FFF59D" stroke-width="1"/>
  <circle cx="150" cy="90" r="15" fill="#FFF9C4" stroke="#FFF59D" stroke-width="1"/>
  <circle cx="165" cy="98" r="13" fill="#FFFDE7" stroke="#FFE082" stroke-width="1"/>
  <!-- Extra popped details -->
  <circle cx="140" cy="112" r="4" fill="#FFB300" opacity="0.3"/>
  <circle cx="158" cy="105" r="5" fill="#FFB300" opacity="0.3"/>
</svg>
