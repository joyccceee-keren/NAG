<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <!-- Package -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE680;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main package body -->
  <rect x="20" y="20" width="160" height="220" fill="url(#goldGrad)" stroke="#DAA520" stroke-width="2" rx="5"/>
  
  <!-- Lay's logo area -->
  <rect x="25" y="25" width="150" height="60" fill="#DC143C" rx="3"/>
  <text x="100" y="60" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">LAY'S</text>
  
  <!-- Classic Salted text -->
  <text x="100" y="100" font-size="14" fill="#DC143C" text-anchor="middle" font-family="Arial">CLASSIC SALTED</text>
  
  <!-- Chips visual -->
  <ellipse cx="70" cy="140" rx="18" ry="28" fill="#FFB347" stroke="#FF8C00" stroke-width="1.5"/>
  <ellipse cx="100" cy="145" rx="20" ry="32" fill="#FFA500" stroke="#FF8C00" stroke-width="1.5"/>
  <ellipse cx="130" cy="140" rx="18" ry="28" fill="#FFB347" stroke="#FF8C00" stroke-width="1.5"/>
  
  <!-- Chip texture details -->
  <circle cx="75" cy="130" r="2" fill="#8B5A2B" opacity="0.5"/>
  <circle cx="100" cy="135" r="2" fill="#8B5A2B" opacity="0.5"/>
  <circle cx="125" cy="130" r="2" fill="#8B5A2B" opacity="0.5"/>
  
  <!-- Salt sparkles -->
  <circle cx="65" cy="155" r="1" fill="white" opacity="0.8"/>
  <circle cx="105" cy="160" r="1" fill="white" opacity="0.8"/>
  <circle cx="135" cy="155" r="1" fill="white" opacity="0.8"/>
  
  <!-- Weight info -->
  <text x="100" y="195" font-size="12" fill="#333" text-anchor="middle" font-family="Arial">51g</text>
  
  <!-- Decorative banner -->
  <rect x="25" y="220" width="150" height="15" fill="#DC143C" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Crispy Golden Taste</text>
</svg>