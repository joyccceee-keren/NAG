<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="brownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#brownGrad)" stroke="#3E2723" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="#FFD700" rx="3"/>
  <text x="100" y="55" font-size="22" font-weight="bold" fill="#654321" text-anchor="middle" font-family="Arial">CRAX</text>
  
  <text x="100" y="95" font-size="13" fill="#FFD700" text-anchor="middle" font-family="Arial">CRUNCHY PIPS</text>
  <text x="100" y="110" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Salted</text>
  
  <!-- Pip/puffs -->
  <circle cx="65" cy="145" r="14" fill="#DAA520" stroke="#8B7500" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="15" fill="#CD853F" stroke="#8B7500" stroke-width="1.5"/>
  <circle cx="135" cy="148" r="13" fill="#DAA520" stroke="#8B7500" stroke-width="1.5"/>
  
  <!-- Salt specks -->
