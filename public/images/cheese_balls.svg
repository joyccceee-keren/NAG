<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Tub Shadow -->
  <ellipse cx="150" cy="260" rx="45" ry="8" fill="#e0e0e0" opacity="0.6" filter="blur(6px)"/>
  <!-- Tub Body -->
  <path d="M115,110 L185,110 L175,250 L125,250 Z" fill="url(#tubBlue)" stroke="#0d47a1" stroke-width="1.5"/>
  <!-- Yellow Lid -->
  <ellipse cx="150" cy="110" rx="36" ry="6" fill="#FFEB3B" stroke="#F57F17" stroke-width="1"/>
  <!-- Tub Label -->
  <rect x="123" y="145" width="54" height="40" rx="2" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="150" y="160" font-family="Arial Black, Impact, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">CHEESE</text>
  <text x="150" y="172" font-family="Arial Black, Impact, sans-serif" font-size="11" fill="#FFEB3B" text-anchor="middle">BALLS</text>
  <!-- Floating cheese balls details -->
  <circle cx="118" cy="180" r="10" fill="#FFC107" stroke="#FF9800" stroke-width="0.75"/>
  <circle cx="182" cy="190" r="8" fill="#FFC107" stroke="#FF9800" stroke-width="0.75"/>
  <circle cx="150" cy="215" r="9" fill="#FFC107" stroke="#FF9800" stroke-width="0.75"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="tubBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="50%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
</svg>
