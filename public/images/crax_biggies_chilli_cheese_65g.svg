<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="blackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F1F1F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="20" y="20" width="160" height="220" fill="url(#blackGrad)" stroke="#FFD700" stroke-width="2" rx="5"/>
  
  <rect x="25" y="25" width="150" height="50" fill="#FFD700" rx="3"/>
  <text x="100" y="55" font-size="24" font-weight="bold" fill="#1F1F1F" text-anchor="middle" font-family="Arial">CRAX</text>
  
  <text x="100" y="95" font-size="13" fill="#FFD700" text-anchor="middle" font-family="Arial">BIGGIES</text>
  <text x="100" y="110" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Chilli Cheese</text>
  
  <!-- Big squares -->
  <rect x="50" y="135" width="22" height="30" fill="#FF6347" stroke="#DC143C" stroke-width="1.5" rx="2"/>
  <rect x="80" y="140" width="22" height="30" fill="#FF7F50" stroke="#DC143C" stroke-width="1.5" rx="2"/>
  <rect x="110" y="135" width="22" height="30" fill="#FF6347" stroke="#DC143C" stroke-width="1.5" rx="2"/>
  
  <!-- Cheese dust -->
  <circle cx="60" cy="150" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="90" cy="155" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="120" cy="150" r="2" fill="#FFD700" opacity="0.8"/>
  
  <text x="100" y="190" font-size="12" fill="white" text-anchor="middle" font-family="Arial">65g</text>
  
  <rect x="25" y="220" width="150" height="15" fill="#DC143C" rx="2"/>
  <text x="100" y="230" font-size="10" fill="white" text-anchor="middle" font-family="Arial">Big & Crunchy</text>
</svg>